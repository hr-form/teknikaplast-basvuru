<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teknika Plast – İş Başvurusu</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f3f4f6;
      color: #374151;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 1.25rem;
    }
    .header-brand {
      font-size: 13px;
      font-weight: 500;
      color: #6b7280;
      letter-spacing: .3px;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 1.5rem;
    }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #e24b4a; flex-shrink: 0; }
    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .stamp {
      width: 72px; height: 72px; border-radius: 50%;
      background: #f3f4f6;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.5rem;
      border: 1px solid #e5e7eb;
    }
    .stamp i { font-size: 32px; color: #9ca3af; }
    .badge {
      display: inline-block;
      background: #fef2f2;
      color: #991b1b;
      font-size: 11px;
      font-weight: 600;
      padding: 4px 14px;
      border-radius: 999px;
      margin-bottom: 1rem;
      border: 1px solid #fecaca;
      letter-spacing: .5px;
      text-transform: uppercase;
    }
    h1 {
      font-size: 19px;
      font-weight: 600;
      color: #111827;
      line-height: 1.45;
      margin-bottom: .75rem;
    }
    .sub {
      font-size: 14px;
      color: #6b7280;
      line-height: 1.75;
    }
    .divider { border: none; border-top: 1px solid #f3f4f6; margin: 1.5rem 0; }
    .detail {
      display: flex; align-items: center; justify-content: center;
      gap: 8px;
      font-size: 13px;
      color: #9ca3af;
    }
    .detail i { font-size: 16px; }
    .footer-brand {
      margin-top: 1.5rem;
      font-size: 11px;
      color: #d1d5db;
    }
    @media (max-width: 480px) {
      .card { padding: 2rem 1.25rem; }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="stamp">
      <i class="ti ti-briefcase-off"></i>
    </div>

    <div class="badge">İlan Kapatıldı</div>

    <h1>Bu pozisyon için başvuru dönemi sona ermiştir.</h1>

    <p class="sub">
      Üretim Elemanı ilanımıza gösterdiğiniz ilgi için teşekkür ederiz.<br />
      Şu an aktif bir alım sürecimiz bulunmamaktadır.
    </p>


  </div>


</body>
</html>
